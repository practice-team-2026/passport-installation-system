{% extends "base.html" %}

{% block title %}Объекты - ВентУчёт{% endblock %}

{% block content %}
    <!-- KPI карточки -->
    <div class="kpi-grid" id="kpiCards">
        <div class="kpi-card">
            <div class="kpi-value" id="totalCount">—</div>
            <div class="kpi-label">Всего объектов</div>
        </div>
        <div class="kpi-card kpi-active">
            <div class="kpi-value" id="activeCount">—</div>
            <div class="kpi-label">Активные</div>
        </div>
        <div class="kpi-card kpi-overdue">
            <div class="kpi-value" id="overdueCount">—</div>
            <div class="kpi-label">Просрочено ТО</div>
        </div>
    </div>

    <!-- Панель управления -->
    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по названию или адресу..." class="input">
        </div>
        <select id="statusFilter" class="select">
            <option value="">Все статусы</option>
            <option value="active">🟢 Активный</option>
            <option value="draft">⚪ Черновик</option>
            <option value="emergency">🔴 Аварийный</option>
            <option value="archived">⚫ Архивный</option>
        </select>
        <button class="btn btn-primary" onclick="openCreateModal()">+ Добавить объект</button>
    </div>

    <!-- Сообщения об ошибках -->
    <div id="errorMessage" class="error-message" style="display: none;"></div>

    <!-- Таблица объектов -->
    <div class="table-container">
        <table class="table" id="installationsTable">
            <thead>
                <tr>
                    <th>Код</th>
                    <th>Название</th>
                    <th>Город</th>
                    <th>Адрес</th>
                    <th>Статус</th>
                    <th>Дата ТО</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="7" class="loading">⏳ Загрузка данных...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="objectModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Новый объект</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="objectForm" onsubmit="handleSubmit(event)">
                <input type="hidden" id="objectId">
                <div class="form-group">
                    <label for="uniqueCode">Уникальный код *</label>
                    <input type="text" id="uniqueCode" class="input" required placeholder="ПАС-031">
                </div>
                <div class="form-group">
                    <label for="name">Название *</label>
                    <input type="text" id="name" class="input" required placeholder="Вентиляционная установка">
                </div>
                <div class="form-group">
                    <label for="city">Город</label>
                    <input type="text" id="city" class="input" placeholder="Москва">
                </div>
                <div class="form-group">
                    <label for="address">Адрес</label>
                    <input type="text" id="address" class="input" placeholder="ул. Тверская, 12">
                </div>
                <div class="form-group">
                    <label for="status">Статус</label>
                    <select id="status" class="select">
                        <option value="draft">Черновик</option>
                        <option value="active" selected>Активный</option>
                        <option value="emergency">Аварийный</option>
                        <option value="archived">Архивный</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
